<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生産残り時間計算</title>

<style>
  body {
    font-family: sans-serif;
    padding: 16px;
    background: #0d0d0d;
    color: #f2f2f2;
  }

  h2 {
    text-align: center;
    margin-bottom: 20px;
    background: linear-gradient(90deg, #66c2ff, #d9a6ff);
    -webkit-background-clip: text;
    color: transparent;
    text-shadow: 0 0 10px #b366ff;
  }

  .box {
    background: #1a1a1a;
    padding: 16px;
    border-radius: 12px;
    box-shadow: 0 0 14px rgba(153, 51, 255, 0.35);
  }

  .row {
    margin-top: 14px;
  }

  .label {
    font-size: 1.1rem;
    margin-bottom: 6px;
    color: #f0d9ff;
  }

  /* ボタン左・数値右の横並び */
  .input-line {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* 横スクロールボタン（スマホ対応） */
  .btn-row-scroll {
    display: flex;
    overflow-x: auto;
    gap: 6px;
    padding-bottom: 4px;
    flex: 1;
  }

  .btn-small {
    min-width: 70px;
    height: 44px;
    font-size: 1rem;
    border: none;
    border-radius: 8px;
    background: #4a3a7a;
    color: #ffffff;
    box-shadow: 0 0 10px rgba(153, 51, 255, 0.7);
    flex-shrink: 0;
  }
  .btn-small:active {
    background: #b366ff;
    box-shadow: 0 0 16px rgba(153, 51, 255, 1);
  }

  /* 入力欄（右寄せ＋リアルタイム3桁区切り） */
  input[type="text"] {
    width: 120px;
    padding: 12px;
    font-size: 1.2rem;
    border-radius: 8px;
    border: 1px solid #555;
    background: #0f0f0f;
    color: #ffffff;
    text-align: right;
    box-shadow: inset 0 0 6px rgba(153, 51, 255, 0.4);
  }

  /* スライダー */
  .slider-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  input[type="range"] {
    width: 100%;
    appearance: none;
    height: 10px;
    border-radius: 5px;
    background: #444;
    outline: none;
    box-shadow: 0 0 8px rgba(153, 51, 255, 0.4);
  }
  input[type="range"]::-webkit-slider-thumb {
    appearance: none;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: #d9a6ff;
    box-shadow: 0 0 12px #d9a6ff;
    cursor: pointer;
  }

  /* ラジオボタン */
  .radio-group {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
  }
  .radio-item {
    background: #111;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 1.1rem;
    border: 1px solid #7d4db8;
    color: #ffffff;
    box-shadow: 0 0 8px rgba(153, 51, 255, 0.4);
  }
  .radio-item input {
    transform: scale(1.4);
    margin-right: 6px;
    accent-color: #d9a6ff;
  }

  /* 計算ボタン */
  button.calc {
    width: 100%;
    padding: 14px;
    margin-top: 20px;
    font-size: 1.2rem;
    background: #6b3fd1;
    color: white;
    border: none;
    border-radius: 10px;
    box-shadow: 0 0 14px rgba(153, 51, 255, 0.8);
  }
  button.calc:active {
    background: #b366ff;
  }

  /* 結果表示 */
  #result {
    margin-top: 20px;
    font-size: 1.3rem;
    font-weight: bold;
    text-align: center;
    white-space: pre-line;
    color: #ffffff;
    text-shadow: 0 0 10px #b366ff;
  }
</style>
</head>

<body>

<h2>生産残り時間計算</h2>

<div class="box">

  <!-- 回転数 -->
  <div class="row">
    <div class="label">回転数（rpm）</div>
    <div class="input-line">
      <div class="btn-row-scroll">
        <button class="btn-small" onclick="chg('rpm', -10)">−10</button>
        <button class="btn-small" onclick="chg('rpm', 10)">＋10</button>
      </div>
      <input type="text" id="rpm" value="650" oninput="formatInputComma(this)">
    </div>
  </div>

  <!-- 稼働率 -->
  <div class="row">
    <div class="label">稼働率（％）</div>
    <div class="slider-wrap">
      <input type="range" id="eff" min="0" max="100" value="100" oninput="effValue.textContent=this.value">
      <span id="effValue">100</span>%
    </div>
  </div>

  <!-- 取り数 -->
  <div class="row">
    <div class="label">取り数（cavity）</div>
    <div class="radio-group">
      <label class="radio-item"><input type="radio" name="cavity" value="1" checked>1</label>
      <label class="radio-item"><input type="radio" name="cavity" value="2">2</label>
      <label class="radio-item"><input type="radio" name="cavity" value="4">4</label>
      <label class="radio-item"><input type="radio" name="cavity" value="6">6</label>
      <label class="radio-item"><input type="radio" name="cavity" value="8">8</label>
    </div>
  </div>

  <!-- 現オーダー残り数量 -->
  <div class="row">
    <div class="label">現オーダー残り数量</div>

    <div class="input-line">
      <div class="btn-row-scroll">
        <button class="btn-small" onclick="chg('remainQty', -10000)">−10k</button>
        <button class="btn-small" onclick="chg('remainQty', -100)">−100</button>
        <button class="btn-small" onclick="chg('remainQty', 100)">＋100</button>
        <button class="btn-small" onclick="chg('remainQty', 10000)">＋10k</button>
      </div>

      <input type="text" id="remainQty" value="400000" oninput="formatInputComma(this)">
    </div>
  </div>

  <!-- オーダー定数 -->
  <div class="row">
    <div class="label">オーダー定数</div>

    <div class="input-line">
      <div class="btn-row-scroll">
        <button class="btn-small" onclick="chg('orderConst', -10000)">−10k</button>
        <button class="btn-small" onclick="chg('orderConst', -100)">−100</button>
        <button class="btn-small" onclick="chg('orderConst', 100)">＋100</button>
        <button class="btn-small" onclick="chg('orderConst', 10000)">＋10k</button>
      </div>

      <input type="text" id="orderConst" value="400000" oninput="formatInputComma(this)">
    </div>
  </div>

  <!-- 残りオーダー数 -->
  <div class="row">
    <div class="label">残りオーダー数</div>

    <div class="input-line">
      <div class="btn-row-scroll">
        <button class="btn-small" onclick="chg('orderRemain', -1)">−</button>
        <button class="btn-small" onclick="chg('orderRemain', 1)">＋</button>
      </div>

      <input type="text" id="orderRemain" value="2" oninput="formatInputComma(this)">
    </div>
  </div>

  <button class="calc" onclick="calc()">計算する</button>

  <div id="result"></div>
</div>

<script>
/* ボタン押したときの増減（カンマ対応） */
function chg(id, diff) {
  const el = document.getElementById(id);
  let v = el.value.replace(/,/g, "");
  v = Number(v) + diff;
  if (v < 0) v = 0;
  el.value = v.toLocaleString();
}

/* 入力欄リアルタイム3桁区切り */
function formatInputComma(el) {
  let v = el.value.replace(/,/g, "");
  if (v === "") return;
  if (!/^\d+$/.test(v)) return;
  el.value = Number(v).toLocaleString();
}

function calc() {
  const rpm = Number(document.getElementById('rpm').value.replace(/,/g, "")) || 0;
  const eff = Number(document.getElementById('eff').value) || 0;
  const cavity = Number(document.querySelector('input[name="cavity"]:checked').value);

  const remainQty = Number(document.getElementById('remainQty').value.replace(/,/g, "")) || 0;
  const orderConst = Number(document.getElementById('orderConst').value.replace(/,/g, "")) || 0;
  const orderRemain = Number(document.getElementById('orderRemain').value.replace(/,/g, "")) || 0;

  const perMin = rpm * cavity * (eff / 100);
  const perHour = perMin * 60;

  const totalRemain = remainQty + (orderConst * orderRemain);

  const remainQtyStr = remainQty.toLocaleString();
  const orderConstStr = orderConst.toLocaleString();
  const totalRemainStr = totalRemain.toLocaleString();

  const remainHours = totalRemain / perHour;
  const totalSec = Math.round(remainHours * 3600);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;

  const now = new Date();
  const finish = new Date(now.getTime() + totalSec * 1000);

  const yyyy = finish.getFullYear();
  const mm = String(finish.getMonth() + 1).padStart(2, '0');
  const dd = String(finish.getDate()).padStart(2, '0');
  const HH = String(finish.getHours()).padStart(2, '0');
  const MM = String(finish.getMinutes()).padStart(2, '0');

  const finishStr = `${yyyy}/${mm}/${dd} ${HH}:${MM}`;

  document.getElementById('result').textContent =
    `現オーダー残り数量：${remainQtyStr} 個
オーダー定数：${orderConstStr} 個
総残数量：${totalRemainStr} 個
稼働率反映：${perHour.toLocaleString()} 個/時
残り：${h}時間 ${m}分 ${s}秒（約${remainHours.toFixed(2)}時間）
完了予定：${finishStr}`;
}
</script>

</body>
</html>
